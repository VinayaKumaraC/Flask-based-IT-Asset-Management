<!DOCTYPE html>
<html>
<head>
    <title>Edit Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Edit Asset</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Asset Name</label>
            <input
                type="text"
                name="asset_name"
                class="form-control"
                value="{{ asset[1] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Asset Type</label>
            <input
                type="text"
                name="asset_type"
                class="form-control"
                value="{{ asset[2] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Serial Number</label>
            <input
                type="text"
                name="serial_number"
                class="form-control"
                value="{{ asset[3] }}"
                required>
        </div>

        <div class="mb-3">
            <label>Status</label>

            <select name="status" class="form-select">

                <option value="Available"
                {% if asset[4] == "Available" %}selected{% endif %}>
                Available
                </option>

                <option value="Assigned"
                {% if asset[4] == "Assigned" %}selected{% endif %}>
                Assigned
                </option>

            </select>

        </div>

        <button class="btn btn-primary">
            Update Asset
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
