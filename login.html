{% extends "base.html" %}

{% block content %}

<div class="login-body">

    <div class="login-container">

        <div class="login-card">

            <div class="text-center mb-4">

                <i class="bi bi-shield-lock-fill login-icon"></i>

                <h2 class="mt-3">
                    Asset Management
                </h2>

                <p class="text-muted">
                    Login to continue
                </p>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="username"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        required>

                </div>

                <button class="btn btn-primary w-100">

                    <i class="bi bi-box-arrow-in-right"></i>
                    Login

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
