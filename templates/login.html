<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Login - IT Asset Management</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
<div class="row justify-content-center align-items-center min-vh-100">

    <div class="col-lg-10">

        <div class="row g-0 shadow-lg rounded-4 overflow-hidden">

            <!-- LEFT PANEL -->

            <div class="col-md-6 bg-primary text-white p-5">

                <div class="h-100 d-flex flex-column justify-content-center">

                    <h1 class="fw-bold mb-4">
                        IT Asset Management
                    </h1>

                    <p class="lead">
                        Manage company assets, employees,
                        assignments and reports from one
                        centralized dashboard.
                    </p>

                    <hr>

                    <div class="mt-4">

                        <p>
                            <i class="bi bi-check-circle-fill"></i>
                            Asset Tracking
                        </p>

                        <p>
                            <i class="bi bi-check-circle-fill"></i>
                            Employee Management
                        </p>

                        <p>
                            <i class="bi bi-check-circle-fill"></i>
                            Assignment History
                        </p>

                        <p>
                            <i class="bi bi-check-circle-fill"></i>
                            Excel Report Generation
                        </p>

                    </div>

                </div>

            </div>

            <!-- RIGHT PANEL -->

            <div class="col-md-6 bg-white p-5">

                <div class="text-center mb-4">

                    <i class="bi bi-shield-lock-fill login-icon"></i>

                    <h2 class="fw-bold mt-3">
                        Welcome Back
                    </h2>

                    <p class="text-muted">
                        Login to continue
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Enter Username"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter Password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100 py-2">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Login

                    </button>

                </form>

                <div class="text-center mt-4">

                    <span class="text-muted">
                        Don't have an account?
                    </span>

                    <a href="/register"
                       class="text-decoration-none fw-bold">
                        Register
                    </a>

                </div>

                <div class="text-center mt-4">

                    <small class="text-muted">
                        © 2025 IT Asset Management System
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>
